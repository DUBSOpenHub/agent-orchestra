name: Agent Orchestra CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  smoke:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@5e713f778875cfaa90ef839c5463322ba480bc8c # v5
        with:
          python-version: "3.12"

      - name: Shell syntax check
        run: bash -n install.sh quickstart.sh bin/agent-orchestra-pulse scripts/activate-security.sh tests/prepublish-smoke.sh tests/smoke.sh

      - name: Local smoke
        run: bash tests/smoke.sh
